name: Reusable Apple Build

# Reusable workflow that archives an Xcode scheme and uploads it to App Store Connect.
# Used by ios-testflight.yml, tvos-testflight.yml, ios-release.yml, tvos-release.yml.
#
# Required secrets (passed via `secrets: inherit` from caller):
#   APPLE_CERTIFICATE_BASE64    - base64-encoded distribution .p12 cert
#   APPLE_CERTIFICATE_PASSWORD  - password for the .p12
#   KEYCHAIN_PASSWORD           - password for the temporary build keychain
#   ASC_API_KEY_ID              - App Store Connect API Key ID (e.g. ABC1234567)
#   ASC_API_KEY_ISSUER_ID       - Issuer ID for the ASC API Key
#   ASC_API_KEY_BASE64          - base64-encoded .p8 private key file

on:
  workflow_call:
    inputs:
      scheme:
        description: 'Xcode scheme to build (e.g. "Solar Lens iOS")'
        required: true
        type: string
      destination:
        description: 'xcodebuild destination (e.g. "generic/platform=iOS")'
        required: true
        type: string
      export-options-plist:
        description: 'Path to ExportOptions plist relative to repo root'
        required: true
        type: string
      ref:
        description: 'Git ref to check out (defaults to triggering ref)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      DEVELOPMENT_TEAM: UYT5K989XD
      ARCHIVE_PATH: ${{ github.workspace }}/build/SolarLens.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      KEYCHAIN_NAME: solarlens-build.keychain

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Select Xcode
        # Pin to a known-good version. Bump deliberately when Apple ships new Xcode.
        # See available versions: https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a dedicated, ephemeral keychain so we don't pollute the runner's login keychain.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Import the cert and grant codesign + security tool access without UI prompts.
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_NAME" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          # Allow codesign to use the imported key without an interactive password prompt.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          # Make the build keychain the default and put it ahead of the login keychain in search order.
          security default-keychain -s "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain

          # Verify the cert is visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

          rm -f "$CERT_PATH"

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          # xcodebuild looks for AuthKey_<ID>.p8 in this directory by convention.
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Archive
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/build"
          xcodebuild \
            -project SolarLens.xcodeproj \
            -scheme "${{ inputs.scheme }}" \
            -configuration Release \
            -destination "${{ inputs.destination }}" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_KEY_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            archive

      - name: Export and upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "${{ inputs.export-options-plist }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_KEY_ISSUER_ID"

      - name: Cleanup keychain and ASC key
        if: always()
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8 || true
