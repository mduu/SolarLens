name: iOS TestFlight Upload

# Builds the iOS scheme (incl. embedded Watch companion) and uploads to TestFlight
# for internal testing. Triggered manually from the GitHub UI or via
# `gh workflow run ios-testflight.yml --ref main` from the /deploy-testflight Claude command.
#
# The build number is taken from APP_VERSION_BUILDNO in the .pbxproj at the
# triggering commit — Claude bumps and commits it before triggering this workflow.

on:
  workflow_dispatch:

jobs:
  upload:
    uses: ./.github/workflows/_apple-build.yml
    with:
      scheme: "Solar Lens iOS"
      destination: "generic/platform=iOS"
      export-options-plist: "ExportOptions-testflight.plist"
    secrets: inherit
